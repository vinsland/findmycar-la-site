<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auction Prices | FindMyCar LA</title>
</head>
<body>
  <h1>Recent Dealer Auction Sales</h1>

  <input id="search" type="text" placeholder="Search: Toyota Corolla, Honda Civic..." />

  <div id="results"></div>

  <script>
    const results = document.getElementById("results");
    const search = document.getElementById("search");

    let cars = [];

    fetch("/data/auction-data.json")
      .then(response => response.json())
      .then(data => {
        cars = data;
        renderCars(cars);
      });

    function renderCars(list) {
      results.innerHTML = "";

      if (list.length === 0) {
        results.innerHTML = "<p>No results found.</p>";
        return;
      }

      list.forEach(car => {
        const card = document.createElement("div");
        card.style.border = "1px solid #ddd";
        card.style.padding = "16px";
        card.style.margin = "12px 0";
        card.style.borderRadius = "8px";

        card.innerHTML = `
          <h3>${car.year || ""} ${car.make || ""} ${car.model || ""}</h3>
          <p><strong>Mileage:</strong> ${car.odometer || car.mileage || ""}</p>
          <p><strong>Grade:</strong> ${car.grade || ""}</p>
          <p><strong>Sold Price:</strong> $${car.price || car.sale_price || ""}</p>
        `;

        results.appendChild(card);
      });
    }

    search.addEventListener("input", () => {
      const query = search.value.toLowerCase();

      const filtered = cars.filter(car => {
        const text = `${car.year} ${car.make} ${car.model}`.toLowerCase();
        return text.includes(query);
      });

      renderCars(filtered);
    });
  </script>
</body>
</html>
